name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src scripts tests
      - name: Unit tests
        run: pytest -q

  acl-gate:
    name: ACL leak gate + eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Start Postgres (pgvector) + OpenFGA
        run: docker compose up -d --wait

      - name: Install
        run: pip install -e ".[dev]"

      # Varsayılan `fake` embedding: model indirmesi/GPU yok. Bu iş retrieval
      # KALİTESİNİ değil, yetki sınırlarını doğrular — ACL filtresi embedding'den
      # bağımsızdır. Kalite ölçümü GPU gerektirir (scripts/run_g2_matrix.py).
      - name: Seed synthetic corpus + permissions
        run: python scripts/seed_synthetic.py

      - name: ACL leak test (must be 0 leaks)
        run: python scripts/acl_leak_test.py

      # Tüketici kontrol: her kullanıcı × her doküman. Sorgu, hedef dokümanın
      # KENDİ metninden üretilir (maksimum baskı) ve iki yön birden doğrulanır —
      # yetkisize sızmıyor VE yetkiliye erişilebilir kalıyor (aşırı filtreleme).
      - name: ACL matrix (every user × every document, both directions)
        run: python scripts/acl_matrix_test.py

      # Eşikler `fake` embedding baseline'ının (MRR 0.664 · hit@5 0.919 ·
      # faktuel 0.950) güvenli altında. fake deterministik olduğundan bu sayılar
      # sabittir; düşerse FTS/RRF füzyonunda gerçek bir regresyon var demektir.
      - name: Golden set eval (authorization boundary + quality floor)
        run: |
          python scripts/run_eval.py --golden eval/golden/golden_v2.jsonl --no-save \
            --min-mrr 0.60 --min-hit5 0.85 --min-category-hit5 faktuel=0.90

      - name: Bring-your-own-docs connector (validate bundled example)
        run: python scripts/ingest_folder.py --docs examples/docs --check

      - name: Service logs on failure
        if: failure()
        run: docker compose logs --tail=100

  docker-demo:
    name: One-command demo boots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bring up full demo stack (one command)
        run: docker compose --profile demo up -d --wait --build

      # Uçtan uca kapı: sağlık + yetkili kullanıcı sonuç alıyor + KISITLI sayfa
      # yetkisiz kullanıcıya dönmüyor. Payload'lar Python'dan JSON olarak
      # gider — kabuk/locale kaynaklı UTF-8 bozulmasına açık değil.
      - name: End-to-end ACL smoke test
        run: |
          pip install httpx
          python scripts/smoke_api.py

      - name: Stack logs on failure
        if: failure()
        run: docker compose --profile demo logs --tail=100
