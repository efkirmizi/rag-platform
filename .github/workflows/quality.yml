name: Retrieval quality (real model)

# Per-PR CI (ci.yml) `fake` embedding ile koşar: hızlı, GPU'suz ve ACL'i +
# FTS/RRF'in yapısal sağlığını korur — ama SEMANTİK kaliteyi ölçemez.
# Bu iş gerçek embedding modeliyle (bge-m3, ADR-3 seçimi) kaliteyi ölçer.
# Ağır olduğu için her PR'da değil; haftalık ve elle tetiklenebilir.

on:
  schedule:
    - cron: "0 4 * * 1" # her pazartesi 04:00 UTC
  workflow_dispatch:
    inputs:
      reranker:
        description: "Reranker'ı da aç (bge-reranker-v2-m3) — yavaş"
        type: boolean
        default: false

jobs:
  quality:
    name: Golden eval with bge-m3
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Model ağırlıkları büyük (bge-m3 ~2.3GB); ilk koşu yavaş, sonrakiler cache'ten.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-bge-m3-v1

      - name: Start Postgres (pgvector) + OpenFGA
        run: docker compose up -d --wait

      - name: Install (with local model extra)
        run: pip install -e ".[dev,local]"

      - name: Index corpus with bge-m3
        env:
          EMBEDDINGS_PROVIDER: local
          EMBEDDINGS_MODEL: BAAI/bge-m3
          EMBEDDINGS_DEVICE: cpu # runner'da GPU yok
        run: python scripts/seed_synthetic.py

      # Eşikler G-2 raporundaki bge-m3 (rerank'siz) baseline'ının altında:
      # MRR 0.937 · hit@5 0.973 · parafraz@5 0.909. CPU/fp32 ile GPU/fp16
      # arasında küçük sayısal farklar olabileceğinden pay bırakıldı.
      - name: Golden eval + quality thresholds
        env:
          EMBEDDINGS_PROVIDER: local
          EMBEDDINGS_MODEL: BAAI/bge-m3
          EMBEDDINGS_DEVICE: cpu
          RERANKER_PROVIDER: ${{ inputs.reranker && 'local' || 'noop' }}
        run: |
          python scripts/run_eval.py --golden eval/golden/golden_v2.jsonl --no-save \
            --min-mrr 0.85 --min-hit5 0.90 \
            --min-category-hit5 faktuel=0.95 --min-category-hit5 parafraz=0.80

      - name: ACL leak test (real embeddings)
        env:
          EMBEDDINGS_PROVIDER: local
          EMBEDDINGS_MODEL: BAAI/bge-m3
          EMBEDDINGS_DEVICE: cpu
        run: python scripts/acl_leak_test.py

      - name: Service logs on failure
        if: failure()
        run: docker compose logs --tail=100
