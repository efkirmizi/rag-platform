name: Bug report
description: Something behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Found a permission bypass?** Do not file it here — report it privately.
        See [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Commands, query, and user. A corpus/permission setup helps a lot.
      placeholder: |
        python scripts/seed_synthetic.py
        python scripts/dev_query.py ayse "yıllık izin kaç gün"
      render: shell
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Retrieval / ranking quality
        - ACL / permissions
        - Ingestion / connectors
        - Eval harness
        - API / service
        - Docker / setup
        - Other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, embedding provider (fake/local/openai), GPU or CPU.
    validations:
      required: false
