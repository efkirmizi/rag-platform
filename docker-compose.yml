services:
  postgres:
    image: pgvector/pgvector:pg16
    # Docker varsayılanı /dev/shm = 64MB. Paralel index kurulumu (HNSW dahil)
    # dinamik shared memory kullanır ve bu sınırda "No space left on device"
    # ile düşer. Ölçek arttıkça gerçek bir kısıt — bkz. scripts/scale_test.py
    shm_size: 1gb
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 20

  openfga-migrate:
    image: openfga/openfga:v1.8.4
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://rag:ragpass@postgres:5432/openfga?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:v1.8.4
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://rag:ragpass@postgres:5432/openfga?sslmode=disable
    ports:
      - "8080:8080"
      - "3000:3000"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=0.0.0.0:8081"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --- Demo profili: `docker compose --profile demo up` ---
  # Varsayılan `docker compose up -d` yalnız altyapıyı (postgres+openfga) ayağa
  # kaldırır; geliştirme akışı değişmez. Demo profili ek olarak korpusu seed'ler
  # ve retrieval API'sini yayına alır.

  seed:
    profiles: ["demo"]
    build: .
    command: python scripts/seed_synthetic.py
    environment:
      DATABASE_URL: postgresql://rag:ragpass@postgres:5432/rag
      FGA_API_URL: http://openfga:8080
      # State dosyası imajdaki infra/openfga'yı gölgelemesin diye ayrı yolda
      FGA_STATE_FILE: /app/state/store.state.json
    volumes:
      - fgastate:/app/state
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_healthy
    restart: "no"

  api:
    profiles: ["demo"]
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rag:ragpass@postgres:5432/rag
      FGA_API_URL: http://openfga:8080
      FGA_STATE_FILE: /app/state/store.state.json
    volumes:
      - fgastate:/app/state
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
  fgastate:
